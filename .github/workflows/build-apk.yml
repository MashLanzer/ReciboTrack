name: Build Release APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - 'capacitor.config.json'
      - '.github/workflows/build-apk.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install Android SDK components
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-36" \
            "build-tools;34.0.0"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle.properties') }}
          restore-keys: gradle-

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Fix Java home in gradle.properties
        run: |
          sed -i "s|org.gradle.java.home=.*|org.gradle.java.home=$JAVA_HOME|" android/gradle.properties

      - name: Decode keystore
        run: |
          base64 -d android/app/recibotrack.keystore > android/app/recibotrack.keystore.bin
          mv android/app/recibotrack.keystore.bin android/app/recibotrack.keystore

      - name: Build release APK
        run: |
          cd android
          ./gradlew assembleRelease

      - name: Rename APK
        run: |
          mkdir -p out
          cp android/app/build/outputs/apk/release/app-release.apk \
             out/ReciboTrack-v${{ github.run_number }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ReciboTrack-APK
          path: out/ReciboTrack-v${{ github.run_number }}.apk
          retention-days: 30

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-v${{ github.run_number }}
          name: "ReciboTrack APK v${{ github.run_number }}"
          body: |
            APK de ReciboTrack lista para instalar en Android.

            **Permisos incluidos:**
            - Cámara (escanear recibos)
            - Notificaciones (recordatorios)
            - Galería/fotos (adjuntar imágenes)
            - Biométrico (huella/face)

            Descarga `ReciboTrack-v${{ github.run_number }}.apk` e instala en tu dispositivo.
          files: out/ReciboTrack-v${{ github.run_number }}.apk
          draft: false
